# Firebase App Hosting 설정 — design-summer (Next.js SSR)
# 문서: https://firebase.google.com/docs/app-hosting/configure
#
# 공개 페이지는 정적 캐시로 서빙되어 스파이크(홍보 트래픽)를 CDN이 흡수하고,
# admin/미들웨어/API 는 Cloud Run 런타임에서 동작한다.

runConfig:
  # 트래픽 없을 땐 0으로 스케일다운(비용 절감), 몰리면 자동 확장.
  minInstances: 0
  maxInstances: 4
  concurrency: 80
  cpu: 1
  memoryMiB: 512
# admin 인증.
# - ADMIN_PASSWORD: 부트스트랩/폴백 비밀번호. 어드민에서 비번 변경 시 Firestore
#   (admin/auth)에 저장되고 그 값이 우선한다. (평문 값 = 약한 보안, 임시)
# - SESSION_SECRET(선택, 미설정): 세션 쿠키 서명 키. 미설정 시 ADMIN_PASSWORD 로
#   서명한다 — 동작은 하지만 공개된 비번값으로 세션 위조가 가능(약한 보안).
#   강화하려면 Secret Manager 로 등록 후 secret: 으로 주입할 것(값을 repo 에 박지 말 것):
#     firebase apphosting:secrets:set SESSION_SECRET   # 32바이트 랜덤 hex 입력
#   그리고 아래에:
#     - variable: SESSION_SECRET
#       secret: SESSION_SECRET
#       availability: [RUNTIME]
env:
  - variable: ADMIN_PASSWORD
    value: "1234"
    availability: [RUNTIME]
